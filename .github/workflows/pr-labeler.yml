name: PR Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize]

concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply type label from PR title
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const pr = context.payload.pull_request.number;

            const PREFIX_TO_LABEL = {
              'feat': 'enhancement', 'feature': 'enhancement',
              'fix': 'bug', 'bugfix': 'bug', 'hotfix': 'bug',
              'docs': 'documentation', 'doc': 'documentation',
              'chore': 'chore', 'refactor': 'chore', 'style': 'chore',
              'test': 'chore', 'tests': 'chore', 'ci': 'chore',
              'build': 'chore', 'perf': 'enhancement', 'revert': 'chore',
            };
            const TYPE_LABELS = new Set(Object.values(PREFIX_TO_LABEL));

            // Refetch live PR title to avoid race with title edits.
            const { data: livePr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr,
            });
            const liveTitle = livePr.title || title;

            const match = liveTitle.match(/^([a-zA-Z]+)(?:\([^)]*\))?[!]?\s*:/);
            const detected = match ? PREFIX_TO_LABEL[match[1].toLowerCase()] : null;
            if (!detected) {
              core.info(`No conventional-commit prefix in: "${liveTitle}" — skipping`);
              return;
            }

            // Ensure the target label exists (create if missing).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: detected,
              });
            } catch (err) {
              if (err.status === 404) {
                const colors = { enhancement: '0075ca', bug: 'd73a4a', documentation: '0075ca', chore: 'e4e669' };
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: detected, color: colors[detected] || 'ededed',
                });
                core.info(`Created missing label "${detected}"`);
              }
            }

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr,
            });
            const current = new Set(currentLabels.map(l => l.name));

            for (const label of TYPE_LABELS) {
              if (current.has(label) && label !== detected) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr, name: label,
                });
              }
            }

            if (!current.has(detected)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, labels: [detected],
              });
              core.info(`Applied label "${detected}" to PR #${pr}`);
            }
