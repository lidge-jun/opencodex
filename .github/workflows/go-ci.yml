name: Go CI

on:
  workflow_dispatch:
  push:
    branches: [dev2-go]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Race detector
        run: go test -race ./... -count=1 -timeout 180s
        if: matrix.os != 'windows-latest'

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: windows/amd64
        run: GOOS=windows GOARCH=amd64 go build ./...

      - name: linux/amd64
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build ./...

      - name: darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build ./...

      - name: linux/arm64
        run: GOOS=linux GOARCH=arm64 go build ./...

  e2e:
    name: E2E Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: E2E tests
        run: go test ./test/e2e/... -v -count=1 -timeout 60s
